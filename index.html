<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
        <div id="system-unavailable">
    <div class="content">
        <h1>System Currently Unavailable</h1>
        <p></p>
        <p>Please try again later.</p>
    </div>
</div>

<style>
#system-unavailable {
    position: fixed;
    inset: 0;
    background: #000;
    color: #fff;
    z-index: 2147483647;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
}

#system-unavailable .content {
    max-width: 600px;
    padding: 30px;
}

#system-unavailable h1 {
    font-size: 42px;
    margin-bottom: 20px;
    font-weight: bold;
}

#system-unavailable p {
    font-size: 18px;
    color: #d0d0d0;
    margin: 8px 0;
}
</style>
</body>
</html>
